<!doctype html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Web-ponencia EPTT 2026 | Matemáticas contextualizadas y retención</title>
  <meta name="description" content="Web-ponencia sobre matemáticas contextualizadas y herramientas digitales para mejorar la retención estudiantil en primer año de Ingeniería en Logística.">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));

    @theme {
      --color-seminar-blue: #1155ff;
      --color-seminar-ink: #070b1a;
      --color-seminar-cyan: #00a6d6;
      --color-seminar-teal: #00a884;
      --color-seminar-gold: #f59e0b;
      --color-seminar-coral: #ff5a3d;
    }
  </style>

  <style>
    :root {
      --split: 100%;
      --nav-h: 76px;
      --ink: #070b1a;
      --muted: #526077;
      --blue: #1155ff;
      --cyan: #00a6d6;
      --teal: #00a884;
      --gold: #f59e0b;
      --coral: #ff5a3d;
      --paper: #fbf8ef;
      --card: rgba(255,255,255,.86);
      --line: rgba(18, 28, 45, .11);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      overflow-x: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fbf8ef;
      color: var(--ink);
      text-rendering: geometricPrecision;
    }

    .split-stage {
      position: relative;
      min-height: 100vh;
      background: #fbf8ef;
    }
    .split-layer-light { position: relative; z-index: 10; }
    .split-layer-dark {
      position: absolute;
      inset: 0;
      z-index: 20;
      min-height: 100%;
      pointer-events: none;
      clip-path: inset(0 0 0 var(--split));
    }
    .split-bar {
      position: fixed;
      top: 0;
      bottom: 0;
      left: var(--split);
      z-index: 1050;
      width: 3px;
      transform: translateX(-50%);
      background: #22d3ee;
      box-shadow: 0 0 28px rgba(34,211,238,.82);
      cursor: ew-resize;
      touch-action: none;
    }
    .split-handle {
      position: fixed;
      top: 50%;
      left: var(--split);
      z-index: 1051;
      width: 52px;
      height: 52px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #1479f7, #00a6d6);
      box-shadow: 0 20px 42px rgba(20,121,247,.34);
      cursor: ew-resize;
      user-select: none;
      touch-action: none;
      border: 5px solid rgba(255,255,255,.22);
      font-weight: 900;
    }
    .mode-light .split-layer-dark,
    .mode-light .split-bar,
    .mode-light .split-handle { display: none; }
    .mode-dark .split-layer-dark { clip-path: inset(0 0 0 0); }
    .mode-dark .split-bar,
    .mode-dark .split-handle { display: none; }

    .site-shell {
      min-height: 100vh;
      position: relative;
      background:
        radial-gradient(circle at 12% 12%, rgba(0,166,214,.18), transparent 34rem),
        radial-gradient(circle at 86% 8%, rgba(0,168,132,.18), transparent 34rem),
        linear-gradient(135deg, #fbf8ef 0%, #eef9ff 100%);
    }
    .site-shell.dark-shell {
      background:
        radial-gradient(circle at 10% 9%, rgba(34,211,238,.14), transparent 35rem),
        radial-gradient(circle at 88% 4%, rgba(16,185,129,.12), transparent 35rem),
        linear-gradient(135deg, #030712 0%, #0f172a 100%);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      height: var(--nav-h);
      border-bottom: 1px solid rgba(15,23,42,.10);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: rgba(255,255,255,.82);
    }
    .dark-shell .topbar {
      background: rgba(3,7,18,.78);
      border-bottom-color: rgba(255,255,255,.10);
    }
    .topbar-inner {
      height: var(--nav-h);
      width: min(1220px, calc(100% - 48px));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .brand-mark {
      width: 50px;
      height: 50px;
      border-radius: 1rem;
      display: grid;
      place-items: center;
      color: #fff;
      flex: 0 0 auto;
      background: linear-gradient(135deg, #1155ff, #00a884);
      box-shadow: 0 18px 36px rgba(0,166,214,.26);
    }
    .brand-title { font-size: 1rem; font-weight: 800; letter-spacing: .01em; line-height: 1.15; }
    .brand-sub { font-size: .82rem; color: #64748b; margin-top: .16rem; }
    .dark-shell .brand-sub { color: #94a3b8; }
    .nav-actions { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; justify-content: flex-end; }
    .mode-control { display: inline-flex; align-items: center; border: 1px solid rgba(15,23,42,.16); border-radius: 999px; overflow: hidden; background: rgba(255,255,255,.72); box-shadow: 0 12px 24px rgba(15,23,42,.08); }
    .dark-shell .mode-control { border-color: rgba(255,255,255,.14); background: rgba(15,23,42,.80); }
    .mode-control button {
      border: 0;
      background: transparent;
      padding: .5rem .9rem;
      font-size: .85rem;
      color: inherit;
      white-space: nowrap;
    }
    .mode-control button.is-active-light { background: #1155ff; color: #fff; }
    .mode-control button.is-active-dark { background: #0f172a; color: #fff; }
    .mode-control button.is-active-compare { background: linear-gradient(135deg, #1155ff, #00a6d6); color: #fff; }
    .pill-btn {
      border: 1px solid rgba(15,23,42,.18);
      border-radius: 999px;
      padding: .54rem 1.05rem;
      text-decoration: none;
      color: inherit;
      background: rgba(255,255,255,.72);
      box-shadow: 0 12px 24px rgba(15,23,42,.08);
      font-weight: 750;
      font-size: .9rem;
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      white-space: nowrap;
    }
    .pill-btn.primary { border-color: transparent; color: white; background: linear-gradient(135deg, #1155ff, #00a6d6); }
    .dark-shell .pill-btn { background: rgba(15,23,42,.80); border-color: rgba(255,255,255,.14); color: #e5e7eb; }
    .dark-shell .pill-btn.primary { background: linear-gradient(135deg, #22d3ee, #34d399); color: #06101b; }

    .slide-dots {
      position: fixed;
      left: 1.1rem;
      top: 50%;
      transform: translateY(-50%);
      z-index: 950;
      padding: .46rem;
      border-radius: 999px;
      background: rgba(255,255,255,.70);
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 16px 34px rgba(15,23,42,.13);
      display: flex;
      flex-direction: column;
      gap: .45rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .dark-shell .slide-dots { background: rgba(15,23,42,.70); border-color: rgba(255,255,255,.10); }
    .slide-dot {
      width: .64rem;
      height: .64rem;
      border-radius: 999px;
      background: #cbd5e1;
      display: block;
      border: 0;
      padding: 0;
      cursor: pointer;
      transition: transform .2s ease, background .2s ease, height .2s ease;
    }
    .slide-dot.active { background: linear-gradient(180deg, #1155ff, #00a6d6); height: 1.15rem; transform: scale(1.08); }
    .dark-shell .slide-dot { background: #475569; }
    .dark-shell .slide-dot.active { background: linear-gradient(180deg, #22d3ee, #34d399); }

    .floating-arrows {
      position: fixed;
      right: 1.2rem;
      bottom: 1.2rem;
      z-index: 960;
      display: flex;
      gap: .55rem;
    }
    .floating-arrows button {
      width: 48px;
      height: 48px;
      border-radius: .15rem;
      border: 1px solid rgba(15,23,42,.12);
      background: rgba(255,255,255,.90);
      color: #0f172a;
      box-shadow: 0 16px 36px rgba(15,23,42,.12);
      font-size: 1.1rem;
    }
    .floating-arrows button:last-child { background: #1155ff; color: white; border-color: #1155ff; }
    .dark-shell .floating-arrows button { background: rgba(15,23,42,.92); color: #e5e7eb; border-color: rgba(255,255,255,.12); }
    .dark-shell .floating-arrows button:last-child { background: #22d3ee; color: #06101b; border-color: #22d3ee; }

    .section-slide {
      min-height: calc(100vh - var(--nav-h));
      padding: clamp(2.8rem, 5vw, 5rem) 0;
      display: flex;
      align-items: center;
      scroll-margin-top: var(--nav-h);
      position: relative;
    }
    .slide-container {
      width: min(1180px, calc(100% - 108px));
      margin-inline: auto;
      position: relative;
    }
    .slide-grid {
      display: grid;
      grid-template-columns: minmax(0, .95fr) minmax(420px, 1.05fr);
      gap: clamp(2rem, 5vw, 4.8rem);
      align-items: center;
    }
    .slide-grid.reverse { grid-template-columns: minmax(420px, 1.05fr) minmax(0, .95fr); }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      color: #1155ff;
      text-transform: uppercase;
      letter-spacing: .18em;
      font-weight: 850;
      font-size: .78rem;
      margin-bottom: .9rem;
    }
    .dark-shell .eyebrow { color: #67e8f9; }
    .title-xl {
      font-weight: 850;
      letter-spacing: -.055em;
      line-height: 1.02;
      font-size: clamp(2.35rem, 5.3vw, 4.85rem);
      max-width: 850px;
      text-wrap: balance;
    }
    .title-lg {
      font-weight: 850;
      letter-spacing: -.045em;
      line-height: 1.04;
      font-size: clamp(2rem, 4.3vw, 3.8rem);
      max-width: 820px;
      text-wrap: balance;
    }
    .lead-text {
      margin-top: 1.25rem;
      color: #475569;
      font-size: clamp(1rem, 1.55vw, 1.25rem);
      line-height: 1.72;
      max-width: 760px;
    }
    .dark-shell .lead-text { color: #cbd5e1; }
    .gradient-word {
      display: inline-block;
      color: #fff;
      padding: .02em .22em .10em;
      border-radius: .30em;
      background: linear-gradient(135deg, #0f172a, #1155ff 58%, #00a884);
      box-shadow: 0 16px 34px rgba(17,85,255,.18);
    }
    .dark-shell .gradient-word { background: linear-gradient(135deg, #22d3ee, #34d399); color: #06101b; }

    .panel {
      border: 1px solid rgba(15,23,42,.10);
      border-radius: 2rem;
      background: rgba(255,255,255,.82);
      box-shadow: 0 28px 60px rgba(15,23,42,.10);
      padding: clamp(1.45rem, 3vw, 2.25rem);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      position: relative;
    }
    .dark-shell .panel {
      border-color: rgba(255,255,255,.10);
      background: rgba(15,23,42,.72);
      box-shadow: 0 28px 60px rgba(0,0,0,.25);
    }
    .panel.soft {
      background: rgba(255,255,255,.68);
    }
    .dark-shell .panel.soft { background: rgba(15,23,42,.58); }

    .mini-badges { display: flex; flex-wrap: wrap; gap: .65rem; margin-bottom: 1.25rem; }
    .mini-badge {
      border: 1px solid rgba(15,23,42,.13);
      border-radius: 999px;
      background: rgba(255,255,255,.78);
      padding: .38rem .78rem;
      color: #334155;
      font-size: .82rem;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(15,23,42,.06);
    }
    .dark-shell .mini-badge { background: rgba(15,23,42,.68); border-color: rgba(255,255,255,.12); color: #dbeafe; }

    .story-list {
      display: grid;
      gap: .9rem;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .story-list li {
      display: grid;
      grid-template-columns: 46px 1fr;
      gap: .9rem;
      align-items: start;
      padding: 1rem;
      border: 1px solid rgba(15,23,42,.08);
      border-radius: 1.2rem;
      background: rgba(248,250,252,.76);
    }
    .dark-shell .story-list li { background: rgba(2,6,23,.38); border-color: rgba(255,255,255,.09); }
    .story-step {
      width: 46px;
      height: 46px;
      border-radius: 1rem;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 850;
      background: linear-gradient(135deg, #1155ff, #00a6d6);
    }
    .dark-shell .story-step { background: linear-gradient(135deg, #22d3ee, #34d399); color: #06101b; }
    .story-list h3 { font-size: 1.08rem; line-height: 1.25; margin: 0; font-weight: 820; }
    .story-list p { color: #526077; line-height: 1.55; margin: .25rem 0 0; font-size: .96rem; }
    .dark-shell .story-list p { color: #cbd5e1; }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
    }
    .card-grid.tight { grid-template-columns: repeat(auto-fit, minmax(215px, 1fr)); }
    .card-grid.two { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .data-card {
      min-width: 0;
      border: 1px solid rgba(15,23,42,.10);
      border-radius: 1.45rem;
      background: rgba(255,255,255,.82);
      box-shadow: 0 20px 42px rgba(15,23,42,.09);
      padding: 1.25rem;
      position: relative;
      min-height: 164px;
      transform: translateZ(0);
      transition: transform .22s ease, box-shadow .22s ease;
      overflow: visible;
    }
    .data-card:hover { transform: translateY(-4px); box-shadow: 0 26px 50px rgba(15,23,42,.13); }
    .dark-shell .data-card { background: rgba(15,23,42,.72); border-color: rgba(255,255,255,.10); box-shadow: 0 20px 42px rgba(0,0,0,.22); }
    .card-head { display: flex; align-items: center; justify-content: space-between; gap: .9rem; margin-bottom: 1.15rem; }
    .label {
      color: #64748b;
      font-weight: 850;
      letter-spacing: .15em;
      text-transform: uppercase;
      font-size: .72rem;
      line-height: 1.35;
      overflow-wrap: normal;
      word-break: normal;
    }
    .dark-shell .label { color: #94a3b8; }
    .icon-tile {
      width: 48px;
      height: 48px;
      flex: 0 0 48px;
      border-radius: 1rem;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, #1155ff, #00a6d6);
      box-shadow: 0 18px 34px rgba(17,85,255,.18);
      transform: perspective(560px) rotateX(12deg) rotateY(-12deg) translateZ(0);
    }
    .icon-tile.teal { background: linear-gradient(135deg, #009e8f, #00a884); box-shadow: 0 18px 34px rgba(0,168,132,.18); }
    .icon-tile.gold { background: linear-gradient(135deg, #f59e0b, #fb923c); box-shadow: 0 18px 34px rgba(245,158,11,.18); }
    .icon-tile.coral { background: linear-gradient(135deg, #ff5a3d, #ef4444); box-shadow: 0 18px 34px rgba(239,68,68,.18); }
    .metric {
      font-weight: 850;
      letter-spacing: -.035em;
      line-height: 1;
      font-size: clamp(2.2rem, 4vw, 3.35rem);
      overflow-wrap: normal;
      word-break: normal;
    }
    .metric.medium { font-size: clamp(1.8rem, 3vw, 2.6rem); line-height: 1.08; }
    .metric small { font-size: .48em; letter-spacing: -.02em; }
    .card-title {
      font-weight: 800;
      font-size: clamp(1.22rem, 1.85vw, 1.65rem);
      line-height: 1.18;
      letter-spacing: -.025em;
      margin: 0 0 .5rem;
      text-wrap: balance;
      overflow-wrap: normal;
      word-break: normal;
    }
    .card-copy { color: #526077; line-height: 1.58; font-size: .98rem; margin: .5rem 0 0; }
    .dark-shell .card-copy { color: #cbd5e1; }

    .thin-rule { height: 1px; background: rgba(15,23,42,.11); margin: 1.35rem 0; }
    .dark-shell .thin-rule { background: rgba(255,255,255,.11); }

    .bars { display: grid; gap: .9rem; margin-top: 1rem; }
    .bar-row { display: grid; grid-template-columns: 120px 1fr 72px; align-items: center; gap: .8rem; font-size: .9rem; color: #526077; }
    .dark-shell .bar-row { color: #cbd5e1; }
    .bar-track { height: 12px; border-radius: 999px; background: rgba(148,163,184,.20); overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #1155ff, #00a6d6); }
    .bar-fill.teal { background: linear-gradient(90deg, #00a884, #34d399); }
    .bar-fill.gold { background: linear-gradient(90deg, #f59e0b, #fb923c); }

    .method-ribbon { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: .9rem; }
    .ribbon-item { padding: 1rem; border-radius: 1.15rem; background: rgba(248,250,252,.78); border: 1px solid rgba(15,23,42,.08); }
    .dark-shell .ribbon-item { background: rgba(2,6,23,.36); border-color: rgba(255,255,255,.09); }
    .ribbon-item strong { display: block; font-size: 1.55rem; line-height: 1; margin-bottom: .45rem; }
    .ribbon-item span { color: #526077; font-size: .92rem; line-height: 1.45; display: block; }
    .dark-shell .ribbon-item span { color: #cbd5e1; }

    .activity-line { display: flex; flex-wrap: wrap; gap: .75rem; }
    .activity-pill {
      border-radius: 999px;
      padding: .62rem .88rem;
      border: 1px solid rgba(15,23,42,.10);
      background: rgba(255,255,255,.72);
      font-weight: 750;
      color: #334155;
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      font-size: .93rem;
    }
    .dark-shell .activity-pill { background: rgba(2,6,23,.42); border-color: rgba(255,255,255,.10); color: #dbeafe; }

    .quote-card {
      border-radius: 1.7rem;
      border: 1px solid rgba(15,23,42,.10);
      background: linear-gradient(135deg, rgba(17,85,255,.08), rgba(0,168,132,.10));
      padding: 1.4rem;
      font-size: 1.08rem;
      line-height: 1.65;
      color: #263448;
    }
    .dark-shell .quote-card { border-color: rgba(255,255,255,.10); color: #e2e8f0; background: linear-gradient(135deg, rgba(34,211,238,.10), rgba(52,211,153,.10)); }

    .refs { display: grid; gap: .65rem; font-size: .82rem; line-height: 1.48; color: #475569; }
    .dark-shell .refs { color: #cbd5e1; }
    .refs p { margin: 0; }

    .icon3d-scene {
      height: 150px;
      position: relative;
      display: grid;
      place-items: center;
      perspective: 900px;
      margin-bottom: 1.1rem;
    }
    .icon3d-shadow {
      position: absolute;
      width: 146px;
      height: 82px;
      border: 2px dashed rgba(15,23,42,.20);
      border-radius: 1.05rem;
      transform: rotateX(62deg) rotateZ(-18deg) translateY(38px);
    }
    .dark-shell .icon3d-shadow { border-color: rgba(255,255,255,.20); }
    .icon3d-plane {
      width: 150px;
      height: 92px;
      border-radius: 1.25rem;
      border: 2px solid rgba(15,23,42,.72);
      background: linear-gradient(135deg, rgba(255,255,255,.88), rgba(238,249,255,.74));
      box-shadow: 0 30px 60px rgba(15,23,42,.14);
      transform: rotateX(55deg) rotateZ(-17deg) translateZ(24px);
      display: grid;
      place-items: center;
      color: #1155ff;
      font-size: 2rem;
    }
    .dark-shell .icon3d-plane { border-color: rgba(255,255,255,.70); color: #22d3ee; background: linear-gradient(135deg, rgba(15,23,42,.92), rgba(30,41,59,.82)); }

    .timeline { display: grid; gap: .9rem; }
    .time-item { display: grid; grid-template-columns: 108px 1fr; gap: 1rem; align-items: start; }
    .time-tag { color: #1155ff; font-weight: 850; letter-spacing: .08em; text-transform: uppercase; font-size: .78rem; padding-top: .1rem; }
    .dark-shell .time-tag { color: #67e8f9; }
    .time-copy { color: #526077; line-height: 1.58; }
    .dark-shell .time-copy { color: #cbd5e1; }

    .footer-note { padding: 2rem 0; border-top: 1px solid rgba(15,23,42,.10); color: #64748b; font-size: .88rem; }
    .dark-shell .footer-note { border-color: rgba(255,255,255,.10); color: #94a3b8; }

    .presenter .section-slide { scroll-snap-align: start; }
    .presenter { scroll-snap-type: y proximity; }

    @media (max-width: 1120px) {
      :root { --nav-h: 88px; }
      .topbar, .topbar-inner { height: var(--nav-h); }
      .topbar-inner { align-items: flex-start; padding-top: .75rem; }
      .nav-actions { gap: .45rem; }
      .slide-grid, .slide-grid.reverse { grid-template-columns: 1fr; }
      .slide-container { width: min(960px, calc(100% - 90px)); }
      .method-ribbon { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }

    @media (max-width: 760px) {
      :root { --nav-h: 124px; }
      .topbar, .topbar-inner { height: var(--nav-h); }
      .topbar-inner { width: calc(100% - 28px); flex-direction: column; align-items: stretch; gap: .65rem; }
      .brand-title { font-size: .94rem; }
      .brand-sub { font-size: .78rem; }
      .nav-actions { justify-content: flex-start; overflow-x: auto; padding-bottom: .2rem; }
      .pill-btn, .mode-control button { font-size: .8rem; padding: .45rem .7rem; }
      .slide-container { width: calc(100% - 34px); }
      .slide-dots { display: none; }

                      <p>WILKINS, J. L. M.; BOWEN, B. D.; MULLINS, S. B. First mathematics course in college and graduating in engineering: dispelling the myth that beginning in higher-level mathematics courses is always a good thing. <em>Journal of Engineering Education</em>, v. 110, n. 3, p. 616-635, 2021. DOI: 10.1002/jee.20411.</p>
                      <p>ZAKARIYA, Y. F. Improving students' mathematics self-efficacy: a systematic review of intervention studies. <em>Frontiers in Psychology</em>, v. 13, 2022. DOI: 10.3389/fpsyg.2022.986622.</p>
                    </div>
                  </div>
                  <div>
                    <p class="eyebrow">Referencias</p>
                    <h2 class="title-lg">Base académica del resumen extendido</h2>
                    <p class="lead-text">Estas referencias corresponden al documento presentado al seminario. La web las mantiene visibles para sostener trazabilidad académica.</p>
                    <div class="thin-rule"></div>
                    <p class="card-copy"><strong>Palabras clave:</strong> ${content.keywords}.</p>
                  </div>
                </div>
              </div>
            </section>
          </main>

          <footer class="footer-note">
            <div class="slide-container d-flex flex-column flex-md-row justify-content-between gap-2">
              <span>Web-ponencia EPTT 2026 · Matemáticas contextualizadas y retención estudiantil</span>
              <span>Bootstrap 5.3 + Tailwind CSS 4 · claro / oscuro / comparar</span>
            </div>
          </footer>
        </div>
      `;
    }

    const root = document.documentElement;
    const splitStage = document.getElementById('splitStage');
    const lightLayer = document.getElementById('lightLayer');
    const darkLayer = document.getElementById('darkLayer');
    const splitBar = document.getElementById('splitBar');
    const splitHandle = document.getElementById('splitHandle');

    lightLayer.innerHTML = shellTemplate('light');
    darkLayer.innerHTML = shellTemplate('dark');

    let currentMode = localStorage.getItem('eptt_web_mode') || 'light';
    let dragging = false;
    let currentIndex = 0;

    function setSplit(percent) {
      const value = Math.max(0, Math.min(100, percent));
      root.style.setProperty('--split', value + '%');
      localStorage.setItem('eptt_split_percent', String(value));
    }
    function setSplitFromClientX(clientX) {
      setSplit((clientX / window.innerWidth) * 100);
    }
    function setMode(mode) {
      currentMode = mode;
      localStorage.setItem('eptt_web_mode', mode);
      splitStage.classList.remove('mode-light', 'mode-dark', 'mode-compare');
      splitStage.classList.add('mode-' + mode);
      document.documentElement.setAttribute('data-bs-theme', mode === 'dark' ? 'dark' : 'light');
      if (mode === 'light') setSplit(100);
      if (mode === 'dark') setSplit(0);
      if (mode === 'compare') {
        const saved = localStorage.getItem('eptt_split_percent');
        setSplit(saved === null ? 50 : Number(saved));
      }
      updateModeButtons();
    }
    function updateModeButtons() {
      const btnLight = document.getElementById('btnLight');
      const btnDark = document.getElementById('btnDark');
      const btnCompare = document.getElementById('btnCompare');
      if (!btnLight || !btnDark || !btnCompare) return;
      btnLight.classList.toggle('is-active-light', currentMode === 'light');
      btnDark.classList.toggle('is-active-dark', currentMode === 'dark');
      btnCompare.classList.toggle('is-active-compare', currentMode === 'compare');
    }
    function goToIndex(index) {
      const bounded = Math.max(0, Math.min(sections.length - 1, index));
      currentIndex = bounded;
      document.getElementById(sections[bounded].id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    function goToId(id) {
      const index = sections.findIndex(s => s.id === id);
      if (index >= 0) goToIndex(index);
    }
    function updateActiveDots(id) {
      document.querySelectorAll('.slide-dot').forEach(dot => dot.classList.toggle('active', dot.dataset.target === id));
      const index = sections.findIndex(s => s.id === id);
      if (index >= 0) currentIndex = index;
    }

    [splitBar, splitHandle].forEach(el => {
      el.addEventListener('pointerdown', (event) => {
        dragging = true;
        setMode('compare');
        setSplitFromClientX(event.clientX);
        event.preventDefault();
      });
    });
    window.addEventListener('pointermove', (event) => {
      if (!dragging) return;
      setSplitFromClientX(event.clientX);
    });
    window.addEventListener('pointerup', () => dragging = false);

    document.getElementById('btnLight')?.addEventListener('click', () => setMode('light'));
    document.getElementById('btnDark')?.addEventListener('click', () => setMode('dark'));
    document.getElementById('btnCompare')?.addEventListener('click', () => setMode('compare'));
    document.getElementById('btnPresenter')?.addEventListener('click', () => {
      document.body.classList.toggle('presenter');
      document.getElementById('inicio')?.scrollIntoView({ behavior: 'smooth' });
    });

    document.querySelectorAll('.slide-dot').forEach(dot => {
      dot.addEventListener('click', () => goToId(dot.dataset.target));
    });
    document.querySelectorAll('.nav-prev').forEach(btn => btn.addEventListener('click', () => goToIndex(currentIndex - 1)));
    document.querySelectorAll('.nav-next').forEach(btn => btn.addEventListener('click', () => goToIndex(currentIndex + 1)));

    const observer = new IntersectionObserver((entries) => {
      const visible = entries.filter(e => e.isIntersecting).sort((a,b) => b.intersectionRatio - a.intersectionRatio)[0];
      if (visible) updateActiveDots(visible.target.id);
    }, { threshold: [0.35, 0.52, 0.7] });
    sections.forEach(s => {
      const el = document.getElementById(s.id);
      if (el) observer.observe(el);
    });

    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();
      if (['arrowdown','pagedown','j'].includes(key)) { event.preventDefault(); goToIndex(currentIndex + 1); }
      if (['arrowup','pageup','k'].includes(key)) { event.preventDefault(); goToIndex(currentIndex - 1); }
      if (key === 'home') { event.preventDefault(); goToIndex(0); }
      if (key === 'end') { event.preventDefault(); goToIndex(sections.length - 1); }
      if (key === '1') setMode('light');
      if (key === '2') setMode('dark');
      if (key === '3') setMode('compare');
      if (key === 'p') document.body.classList.toggle('presenter');
    });

    setMode(currentMode);
    updateActiveDots('inicio');
  </script>
</body>
</html>
